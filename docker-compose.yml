# نشرة لبنان — بيئة التطوير (المرحلة 1)
# مضبوطة لـ Apple Silicon (M4 / ARM64) وتعمل كذلك على Intel و Linux VPS بلا تغيير.
services:
  app:
    build:
      context: ./docker/php
    image: nashra-app:latest
    container_name: nashra_app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      mysql:
        condition: service_healthy
    networks: [nashra]
    restart: unless-stopped          # ديمومة: يعيد التشغيل تلقائيًا

  # مُجدوِل المهام: يشغّل php artisan schedule:work ليطلق nashra:fetch يوميًا
  scheduler:
    build:
      context: ./docker/php
    image: nashra-app:latest
    container_name: nashra_scheduler
    working_dir: /var/www
    command: php artisan schedule:work
    volumes:
      - ./src:/var/www
    depends_on:
      mysql:
        condition: service_healthy
    networks: [nashra]
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: nashra_nginx
    ports:
      - "8080:80"                     # افتح المتصفح على http://localhost:8080
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [nashra]
    restart: unless-stopped

  mysql:
    image: mysql:8.0                  # يدعم ARM64 (M4) رسميًا
    container_name: nashra_mysql
    environment:
      MYSQL_DATABASE: nashra
      MYSQL_USER: nashra
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3307:3306"                   # 3307 على المضيف لتفادي التعارض مع MySQL محلي
    volumes:
      - dbdata:/var/lib/mysql         # البيانات تبقى محفوظة ولو أوقفت الحاويات
    networks: [nashra]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootsecret"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  dbdata:

networks:
  nashra:
    driver: bridge
